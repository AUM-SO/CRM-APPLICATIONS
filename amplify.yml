version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g bun
        - bun install --frozen-lockfile
    build:
      commands:
        - bun run build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - apps/web/.next/cache/**/*
      - ~/.bun/**/*
